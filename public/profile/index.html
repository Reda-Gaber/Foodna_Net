<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>الملف الشخصي – فودنا</title>
  <link rel="stylesheet" href="/css/design-system.css">
  <link rel="stylesheet" href="/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      background: #f4f6fb;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #1a1a2e;
    }

    /* ===== Top Bar ===== */
    .profile-topbar {
      background: var(--text-color);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(238,90,82,0.25);
    }
    .profile-topbar a {
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      opacity: 0.9;
      transition: opacity .2s;
    }
    .profile-topbar a:hover { opacity: 1; }
    .profile-topbar .brand {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: .5px;
    }

    /* ===== Page Layout ===== */
    .profile-page {
      max-width: 820px;
      margin: 32px auto;
      padding: 0 16px 60px;
    }

    /* ===== Card ===== */
    .p-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      padding: 28px 32px;
      margin-bottom: 24px;
    }
    .p-card h2 {
      margin: 0 0 22px;
      font-size: 18px;
      font-weight: 700;
      color: var(--text-color);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ===== Avatar ===== */
    .avatar-wrap {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .avatar-img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--text-color);
      background: #f0f0f0;
    }
    .avatar-info { flex: 1; }
    .avatar-name {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 4px;
    }
    .avatar-email { color: #777; font-size: 14px; margin: 0; }
    .avatar-change-label {
      cursor: pointer;
      font-size: 13px;
      color: var(--text-color);
      text-decoration: underline;
      margin-top: 8px;
      display: inline-block;
    }

    /* ===== Form Fields ===== */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 540px) { .form-row { grid-template-columns: 1fr; } }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 13px;
      font-weight: 600;
      color: #444;
    }
    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="password"],
    textarea {
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
      width: 100%;
    }
    input:focus, textarea:focus {
      border-color: var(--text-color);
      box-shadow: 0 0 0 3px rgba(238,90,82,0.12);
    }
    textarea { resize: vertical; min-height: 70px; }

    /* ===== Buttons ===== */
    .btn-primary {
      background: var(--text-color);
      color: #fff;
      border: none;
      border-radius: 9px;
      padding: 11px 28px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }
    .btn-primary:hover   { opacity: .9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .6; cursor: default; transform: none; }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      border: none;
      border-radius: 9px;
      padding: 11px 22px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: background .2s;
    }
    .btn-secondary:hover { background: #e4e4e4; }

    .btn-danger {
      background: #fff;
      color: #e53935;
      border: 1.5px solid #e53935;
      border-radius: 9px;
      padding: 9px 20px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
      transition: all .2s;
    }
    .btn-danger:hover { background: #e53935; color: #fff; }

    /* ===== Alert messages ===== */
    .alert {
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      margin-top: 12px;
      display: none;
    }
    .alert.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; display: block; }
    .alert.error   { background: #fff0f0; color: #c62828; border: 1px solid #ef9a9a; display: block; }

    /* ===== Divider ===== */
    .divider { border: 0; border-top: 1.5px solid #f0f0f0; margin: 10px 0 22px; }

    /* ===== Orders quick link ===== */
    .orders-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: #fff7f0;
      border-radius: 12px;
      border: 1.5px solid #ffe0cc;
      text-decoration: none;
      color: #1a1a2e;
      transition: box-shadow .2s;
    }
    .orders-link:hover { box-shadow: 0 4px 16px rgba(238,90,82,0.13); }
    .orders-link .title { font-weight: 700; font-size: 15px; }
    .orders-link .sub   { font-size: 13px; color: #777; margin-top: 2px; }
    .orders-link .arrow { font-size: 20px; color: var(--text-color); }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <nav class="profile-topbar">
    <a href="/" class="brand">🍽️ فودنا</a>
    <a href="/customer/orders"><i class="fas fa-receipt"></i> طلباتي</a>
  </nav>

  <!-- Page -->
  <div class="profile-page">

    <!-- بطاقة المعلومات الشخصية -->
    <div class="p-card">
      <div class="avatar-wrap">
        <img src="/images/default-avatar.png" alt="صورة الملف" class="avatar-img" id="fsd-avatar"
             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23eee%22/><text x=%2250%22 y=%2265%22 text-anchor=%22middle%22 font-size=%2240%22>👤</text></svg>'">
        <div class="avatar-info">
          <p class="avatar-name" id="fsd-display-name">جارٍ التحميل...</p>
          <p class="avatar-email" id="fsd-display-email"></p>
          <label class="avatar-change-label" for="fsd-avatar-input">
            <i class="fas fa-camera"></i> تغيير الصورة
          </label>
          <input type="file" id="fsd-avatar-input" accept="image/*" style="display:none">
        </div>
      </div>

      <h2><i class="fas fa-user-edit"></i> تعديل البيانات الشخصية</h2>

      <form id="fsd-profile-form" onsubmit="return false;">
        <div class="form-row">
          <div class="form-group">
            <label for="fsd-name">الاسم الكامل *</label>
            <input id="fsd-name" type="text" maxlength="120" placeholder="اسمك الكامل">
          </div>
          <div class="form-group">
            <label for="fsd-email">البريد الإلكتروني *</label>
            <input id="fsd-email" type="email" placeholder="example@mail.com">
          </div>
          <div class="form-group">
            <label for="fsd-phone">رقم الهاتف</label>
            <input id="fsd-phone" type="tel" maxlength="20" placeholder="01xxxxxxxxx">
          </div>
        </div>
        <div class="form-group">
          <label for="fsd-address">عنوان التوصيل</label>
          <textarea id="fsd-address" maxlength="500" placeholder="مثال: شارع النيل، عمارة 5، شقة 10"></textarea>
        </div>

        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
          <button type="button" id="fsd-save" class="btn-primary">
            <i class="fas fa-save"></i> حفظ التغييرات
          </button>
        </div>
        <div id="fsd-msg" class="alert"></div>
      </form>
    </div>

    <!-- بطاقة تغيير كلمة المرور -->
    <div class="p-card">
      <h2><i class="fas fa-lock"></i> تغيير كلمة المرور</h2>

      <div class="form-row">
        <div class="form-group">
          <label for="fsd-pass-current">كلمة المرور الحالية *</label>
          <input id="fsd-pass-current" type="password" placeholder="••••••••">
        </div>
        <div class="form-group">
          <label for="fsd-pass-new">كلمة المرور الجديدة *</label>
          <input id="fsd-pass-new" type="password" placeholder="4 أحرف على الأقل">
        </div>
        <div class="form-group">
          <label for="fsd-pass-confirm">تأكيد كلمة المرور *</label>
          <input id="fsd-pass-confirm" type="password" placeholder="••••••••">
        </div>
      </div>

      <button type="button" id="fsd-pass-save" class="btn-primary" style="background:linear-gradient(135deg,#ff9500,#e68900);">
        <i class="fas fa-key"></i> تغيير كلمة المرور
      </button>
      <div id="fsd-pass-msg" class="alert"></div>
    </div>

    <!-- رابط سريع للطلبات -->
    <a href="/customer/orders" class="orders-link">
      <div>
        <div class="title"><i class="fas fa-box" style="color:var(--text-color);margin-left:6px;"></i> طلباتي</div>
        <div class="sub">عرض جميع طلباتك السابقة وتتبع حالتها</div>
      </div>
      <span class="arrow">←</span>
    </a>

    <!-- تسجيل الخروج -->
    <div style="text-align:center;margin-top:28px;">
      <button type="button" id="fsd-logout" class="btn-danger">
        <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
      </button>
    </div>

  </div><!-- /profile-page -->

  <script>
  (async function(){
    // ===== جلب بيانات المستخدم =====
    async function fetchUser(){
      try{
        const res = await fetch('/auth/api/auth/check', { credentials: 'include' });
        const data = await res.json().catch(() => null);
        if (!res.ok || !data || !data.authenticated) return null;
        return data.user || null;
      }catch(e){ return null; }
    }

    const user = await fetchUser();
    if (!user){
      window.location.replace('/user/register');
      return;
    }

    // ===== تعبئة النموذج =====
    const nameEl    = document.getElementById('fsd-name');
    const emailEl   = document.getElementById('fsd-email');
    const phoneEl   = document.getElementById('fsd-phone');
    const addressEl = document.getElementById('fsd-address');
    const avatarEl  = document.getElementById('fsd-avatar');

    nameEl.value    = user.Customer_Name || user.name  || '';
    emailEl.value   = user.Email         || user.email || '';
    phoneEl.value   = user.Phone         || user.phone || '';
    addressEl.value = user.Address       || '';

    document.getElementById('fsd-display-name').textContent  = nameEl.value  || 'مستخدم';
    document.getElementById('fsd-display-email').textContent = emailEl.value || '';

    if (user.Avatar) avatarEl.src = '/' + user.Avatar.replace(/^\/+/, '');

    // ===== معاينة الصورة =====
    document.getElementById('fsd-avatar-input').addEventListener('change', function(){
      const f = this.files && this.files[0];
      if (!f) return;
      avatarEl.src = URL.createObjectURL(f);
    });

    // ===== مساعد: عرض رسالة =====
    function showMsg(elId, msg, type){
      const el = document.getElementById(elId);
      if (!el) return;
      el.textContent  = msg;
      el.className    = 'alert ' + type;
      setTimeout(() => { el.className = 'alert'; el.textContent = ''; }, 5000);
    }

    function setLoading(btn, loading){
      btn.disabled      = loading;
      btn.style.opacity = loading ? '0.65' : '1';
    }

    // ===== حفظ بيانات الملف الشخصي =====
    document.getElementById('fsd-save').addEventListener('click', async function(){
      const btn = this;
      const payload = {
        name:    nameEl.value.trim(),
        email:   emailEl.value.trim(),
        phone:   phoneEl.value.trim(),
        address: addressEl.value.trim()
      };

      if (!payload.name || !payload.email){
        showMsg('fsd-msg', 'الاسم والبريد الإلكتروني مطلوبان', 'error');
        return;
      }

      setLoading(btn, true);
      try{
        const res  = await fetch('/user/api/update', {
          method:      'PUT',
          credentials: 'include',
          headers:     { 'Content-Type': 'application/json' },
          body:        JSON.stringify(payload)
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.success){
          showMsg('fsd-msg', '✓ تم حفظ التغييرات بنجاح', 'success');
          document.getElementById('fsd-display-name').textContent  = payload.name;
          document.getElementById('fsd-display-email').textContent = payload.email;
        } else {
          showMsg('fsd-msg', data.message || 'فشل الحفظ', 'error');
        }
      }catch(err){
        showMsg('fsd-msg', 'خطأ في الاتصال بالخادم', 'error');
      }finally{
        setLoading(btn, false);
      }
    });

    // ===== تغيير كلمة المرور =====
    document.getElementById('fsd-pass-save').addEventListener('click', async function(){
      const btn     = this;
      const current = document.getElementById('fsd-pass-current').value;
      const nw      = document.getElementById('fsd-pass-new').value;
      const conf    = document.getElementById('fsd-pass-confirm').value;

      if (!current || !nw){ showMsg('fsd-pass-msg', 'أدخل كلمة المرور الحالية والجديدة', 'error'); return; }
      if (nw !== conf)     { showMsg('fsd-pass-msg', 'تأكيد كلمة المرور لا يطابق', 'error');        return; }
      if (nw.length < 4)  { showMsg('fsd-pass-msg', 'كلمة المرور يجب أن تكون 4 أحرف على الأقل', 'error'); return; }

      setLoading(btn, true);
      try{
        const res  = await fetch('/user/api/update-password', {
          method:      'PUT',
          credentials: 'include',
          headers:     { 'Content-Type': 'application/json' },
          body:        JSON.stringify({ currentPassword: current, newPassword: nw })
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.success){
          showMsg('fsd-pass-msg', '✓ تم تغيير كلمة المرور بنجاح', 'success');
          document.getElementById('fsd-pass-current').value = '';
          document.getElementById('fsd-pass-new').value     = '';
          document.getElementById('fsd-pass-confirm').value = '';
        } else {
          showMsg('fsd-pass-msg', data.message || 'فشل تغيير كلمة المرور', 'error');
        }
      }catch(err){
        showMsg('fsd-pass-msg', 'خطأ في الاتصال بالخادم', 'error');
      }finally{
        setLoading(btn, false);
      }
    });

    // ===== تسجيل الخروج =====
    document.getElementById('fsd-logout').addEventListener('click', async function(){
      try{
        await fetch('/auth/logout', { method: 'POST', credentials: 'include' });
      }catch(_){}
      try{ localStorage.clear(); }catch(_){}
      window.location.replace('/user/register');
    });

  })();
  </script>
</body>
</html>
